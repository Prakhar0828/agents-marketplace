# Fly.io app configuration.
# After `fly launch --no-deploy`, run:
#   fly secrets set OPENAI_API_KEY=... APIFY_API_TOKEN=...
#   fly deploy

app = "bafna-agents-marketplace"
primary_region = "bom"  # Mumbai — lowest latency for India

[build]
  dockerfile = "Dockerfile"

[env]
  OPENAI_MODEL = "gpt-5.4"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
